<body>
  <div id="page-loader" class="page-loader" aria-label="Загрузка" aria-busy="true">
    <div class="page-loader__spinner" aria-hidden="true"></div>
  </div>
  <main class="landing-shell">
  <div class="full-width-image full-width-image--first">
    <div class="first-promo-strip" role="banner">
      <img class="first-promo-strip__icon" src="assets/mc-promo-icon.svg" width="28" height="28" alt="" decoding="async">
      <p class="first-promo-strip__text">
        Бесплатный мастер-класс <span id="first-promo-strip-date" class="first-promo-strip__accent"></span>
      </p>
    </div>
    <img src="assets/1.png" alt="Изображение 1">
  </div>
  <div class="full-width-image full-width-image--hero">
    <img src="assets/2.png" alt="Изображение 2">
    <div class="hero-overlay">
      <img src="assets/button1.png" alt="" class="hero-overlay__button screen-overlay-trigger">
      <div class="hero-overlay__hint-row">
        <p class="hero-overlay__hint">Для регистрации кликни тут</p>
        <img src="assets/arrow1.svg" alt="" class="hero-overlay__hint-arrow" width="12" height="19">
      </div>
      <p class="hero-overlay__timer" id="hero-countdown-timer" aria-live="polite">09:59:00</p>
    </div>
  </div>
  <div class="full-width-image">
    <img src="assets/3.png" alt="Изображение 3">
  </div>

  <div class="full-width-image">

  </div>
  <div class="full-width-image">

  </div>
  <div class="full-width-image">
    <img src="assets/7.png" alt="Изображение 7" class="screen-overlay-trigger">
  </div>
  <div class="full-width-image">
    <img src="assets/8.png" alt="Изображение 8">
  </div>
  <div class="full-width-image">
    <img src="assets/9.png" alt="Изображение 9" class="screen-overlay-trigger">
  </div>
  <div class="full-width-image">
    <img src="assets/10.png" alt="Изображение 10">
  </div>
  <div class="full-width-image">
    <img src="assets/11.png" alt="Изображение 11" class="screen-overlay-trigger">
  </div>
  </main>

  <script>
    (function () {
      var TZ = "Europe/Kyiv";

      function getKyivParts(date) {
        var map = {};
        new Intl.DateTimeFormat("en-GB", {
          timeZone: TZ,
          year: "numeric",
          month: "numeric",
          day: "numeric",
          hour: "numeric",
          minute: "numeric",
          second: "numeric",
          hour12: false,
        })
          .formatToParts(date)
          .forEach(function (seg) {
            if (seg.type !== "literal") map[seg.type] = seg.value;
          });
        return {
          year: +map.year,
          month: +map.month,
          day: +map.day,
          hour: +map.hour,
          minute: +map.minute,
          second: +map.second,
        };
      }

      function formatHHMMKyiv(date) {
        var p = getKyivParts(date);
        var h = p.hour;
        var m = p.minute;
        return (h < 10 ? "0" : "") + h + ":" + (m < 10 ? "0" : "") + m;
      }

      console.log("[landing3] Время (Киев):", formatHHMMKyiv(new Date()));

      var months = [
        "января",
        "февраля",
        "марта",
        "апреля",
        "мая",
        "июня",
        "июля",
        "августа",
        "сентября",
        "октября",
        "ноября",
        "декабря",
      ];
      var el = document.getElementById("first-promo-strip-date");
      if (!el) return;

      var now = new Date();
      var p = getKyivParts(now);
      var secSinceMidnight =
        p.hour * 3600 + p.minute * 60 + p.second;
      var after1700 = secSinceMidnight > 17 * 3600;

      var y = p.year;
      var mo = p.month;
      var d = p.day;
      if (after1700) {
        var startKey = y * 10000 + mo * 100 + d;
        var t = now.getTime();
        var guard = 0;
        while (guard++ < 48) {
          t += 3600000;
          var q = getKyivParts(new Date(t));
          var qKey = q.year * 10000 + q.month * 100 + q.day;
          if (qKey !== startKey) {
            y = q.year;
            mo = q.month;
            d = q.day;
            break;
          }
        }
      }

      el.textContent = d + " " + months[mo - 1];
    })();

    (function () {
      var loader = document.getElementById("page-loader");
      if (!loader) return;
      function hideLoader() {
        loader.hidden = true;
        loader.setAttribute("aria-hidden", "true");
        loader.setAttribute("aria-busy", "false");
      }
      if (document.readyState === "complete") hideLoader();
      else window.addEventListener("load", hideLoader);
    })();

    (function () {
      var el = document.getElementById("hero-countdown-timer");
      if (!el) return;

      var durationMs = 9 * 60 * 1000 + 59 * 1000;
      var start = performance.now();

      function pad(n, len) {
        var s = String(n);
        while (s.length < len) s = "0" + s;
        return s;
      }

      function tick(ts) {
        var elapsed = ts - start;
        while (elapsed >= durationMs) {
          start += durationMs;
          elapsed = ts - start;
        }
        var left = durationMs - elapsed;

        var minutes = Math.floor(left / 60000);
        var seconds = Math.floor((left % 60000) / 1000);
        var cs = Math.floor((left % 1000) / 10);

        el.textContent =
          pad(minutes, 2) + ":" + pad(seconds, 2) + ":" + pad(cs, 2);

        requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    })();

    (function () {
      document.querySelectorAll(".screen-overlay-trigger").forEach(function (node) {
        node.addEventListener("click", function (e) {
          e.preventDefault();
          window.location.href = "thanks.html";
        });
      });
    })();

    (function () {
      function blockMultiTouch(e) {
        if (e.touches && e.touches.length > 1) e.preventDefault();
      }

      document.addEventListener("touchstart", blockMultiTouch, { passive: false });
      document.addEventListener("touchmove", blockMultiTouch, { passive: false });

      ["gesturestart", "gesturechange", "gestureend"].forEach(function (type) {
        document.addEventListener(type, function (e) {
          e.preventDefault();
        });
      });

      document.addEventListener(
        "wheel",
        function (e) {
          if (e.ctrlKey) e.preventDefault();
        },
        { passive: false }
      );
    })();
  </script>
</body>
</html>
