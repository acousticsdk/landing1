<article class="legal-doc" lang="uk"><p class="legal-doc__lead">ДОГОВІР ПУБЛІЧНОЇ ОФЕРТИ</p><p class="legal-doc__lead">про надання інформаційно-консультаційних послуг</p><p class="legal-doc__lead">Редакція від 22 квітня 2026 р.</p><p class="legal-doc__p">Цей документ є офіційною публічною пропозицією (публічною офертою) Фізичної особи – підприємця ФОП ДОБРОВОЛЬСЬКА ОЛЕНА ГРИГОРІВНА (РНОКПП: 3009214163), надалі — «Виконавець», на адресу будь-якої дієздатної фізичної особи або юридичної особи (надалі — «Замовник»), і містить усі істотні умови надання інформаційно-консультаційних послуг.</p><p class="legal-doc__p">Відповідно до ст. 633, 641, 642 Цивільного кодексу України, а також Закону України «Про електронну комерцію», беззастережним прийняттям (акцептом) цієї оферти вважається здійснення Замовником оплати послуг Виконавця на умовах, передбачених цим Договором. З моменту акцепту ця оферта вважається укладеним договором на викладених у ній умовах.</p><p class="legal-doc__p">Уважно ознайомтеся з текстом оферти. Якщо Ви не згодні з будь-якою її умовою — не здійснюйте оплату.</p><h3 class="legal-doc__section">1. Терміни та визначення</h3><ul class="legal-doc__list"><li>«Виконавець» — ФОП ДОБРОВОЛЬСЬКА ОЛЕНА ГРИГОРІВНА, що здійснює діяльність на території України та надає інформаційно-консультаційні послуги дистанційно.</li><li>«Замовник» — будь-яка дієздатна фізична особа або юридична особа, яка ознайомилася з умовами цієї оферти та прийняла її шляхом оплати.</li><li>«Сайт» — інтернет-ресурс Виконавця, розташований за адресою <a href="https://www.systemx100.com" target="_blank" rel="noopener noreferrer">https://www.systemx100.com</a>, включно з усіма його піддоменами та сторінками.</li><li>«Послуги» — інформаційно-консультаційні послуги, що надаються Виконавцем у межах програми Програма «Система покращень X100», включно, але не обмежуючись: онлайн-консультації, доступ до навчальних матеріалів, методичні рекомендації та супровід.</li><li>«Бронювання місця» — попередня оплата Замовником частини вартості Послуг, яка підтверджує намір Замовника брати участь у Програмі та закріплює за ним місце на відповідному потоці.</li><li>«Акцепт» — повне та беззастережне прийняття Замовником умов цієї оферти, що виражається в оплаті послуг (або частини вартості послуг у вигляді Бронювання місця).</li></ul><h3 class="legal-doc__section">2. Предмет Договору</h3><p class="legal-doc__p"><strong>2.1.</strong> Виконавець зобов’язується надати Замовнику інформаційно-консультаційні послуги, а Замовник зобов’язується оплатити ці послуги у розмірі та порядку, встановлених цим Договором.</p><p class="legal-doc__p"><strong>2.2.</strong> Найменування послуги: Програма «Система покращень X100».</p><p class="legal-doc__p"><strong>2.3.</strong> Послуги надаються дистанційно з використанням мережі Інтернет, у тому числі через месенджери, платформи відеозв’язку, електронну пошту та інші засоби комунікації, погоджені Сторонами.</p><p class="legal-doc__p"><strong>2.4.</strong> Виконавець надає послуги виключно інформаційно-консультаційного характеру. Інформація, отримана Замовником, має рекомендаційний характер і не є медичною, психологічною, психотерапевтичною, юридичною, фінансовою, інвестиційною, податковою чи іншою ліцензованою професійною допомогою.</p><p class="legal-doc__p"><strong>2.5.</strong> Виконавець не гарантує досягнення Замовником конкретних фінансових, матеріальних, особистісних чи інших результатів. Результат залежить від зусиль, сумлінного виконання рекомендацій та індивідуальних обставин Замовника.</p><h3 class="legal-doc__section">3. Порядок оформлення замовлення та акцепту</h3><p class="legal-doc__p"><strong>3.1.</strong> Замовник оформлює замовлення шляхом заповнення форми на сторінці <a href="https://www.systemx100.com/form" target="_blank" rel="noopener noreferrer">https://www.systemx100.com/form</a>, вказавши своє ім’я, номер телефону та контакт у месенджері.</p><p class="legal-doc__p"><strong>3.2.</strong> Після заповнення форми Замовник перенаправляється на сторінку оплати Бронювання місця.</p><p class="legal-doc__p"><strong>3.3.</strong> Вартість Бронювання місця становить 50 (п’ятдесят) євро. Бронювання закріплює за Замовником місце на найближчому потоці Програми та зараховується до загальної вартості Послуг.</p><p class="legal-doc__p"><strong>3.4.</strong> Повна вартість Послуг, умови її внесення, строки та формат проведення Програми погоджуються із Замовником індивідуально після оплати Бронювання — під час безкоштовної ознайомчої консультації або за її підсумками.</p><p class="legal-doc__p"><strong>3.5.</strong> Акцептом цієї оферти є момент успішного зарахування грошових коштів Бронювання на рахунок Виконавця. З цього моменту ця оферта вважається укладеним договором.</p><p class="legal-doc__p"><strong>3.6.</strong> Замовник підтверджує, що до здійснення оплати він ознайомився з усіма умовами цього Договору, Політикою конфіденційності та згоден з ними у повному обсязі.</p><h3 class="legal-doc__section">4. Вартість послуг та порядок оплати</h3><p class="legal-doc__p"><strong>4.1.</strong> Вартість Бронювання місця становить 50 (п’ятдесят) євро (EUR).</p><p class="legal-doc__p"><strong>4.2.</strong> Оплата здійснюється у безготівковій формі з використанням платіжної системи WayForPay шляхом списання грошових коштів з банківської картки Замовника або іншим доступним на сторінці оплати способом.</p><p class="legal-doc__p"><strong>4.3.</strong> Процесинг платежів здійснюється через платіжний сервіс ТОВ «ВЕЙ ФОР ПЕЙ» (WayForPay), Україна. Виконавець не отримує та не зберігає повні дані банківських карток Замовника.</p><p class="legal-doc__p"><strong>4.4.</strong> Якщо банківська картка Замовника випущена у валюті, відмінній від EUR, конвертація здійснюється банком-емітентом картки за його курсом та правилами на момент проведення транзакції. Курсова різниця, що виникає, а також можливі банківські комісії не є частиною вартості Послуг і Виконавцем не компенсуються.</p><p class="legal-doc__p"><strong>4.5.</strong> Датою оплати вважається дата надходження грошових коштів на розрахунковий рахунок Виконавця.</p><p class="legal-doc__p"><strong>4.6.</strong> Послуги вважаються оплаченими Замовником після отримання Виконавцем від платіжної системи підтвердження про успішне проведення транзакції.</p><h3 class="legal-doc__section">5. Права та обов’язки Сторін</h3><p class="legal-doc__p"><strong>5.1.</strong> Виконавець зобов’язується:</p><ul class="legal-doc__list"><li>Надати Послуги в обсязі та якості, що відповідають опису Програми.</li><li>Зв’язатися із Замовником за вказаними у заявці контактними даними у розумний строк після оплати Бронювання для погодження дати та формату безкоштовної консультації та/або початку Програми.</li><li>Забезпечити збереження персональних даних Замовника відповідно до Політики конфіденційності та законодавства України.</li></ul><p class="legal-doc__p"><strong>5.2.</strong> Виконавець має право:</p><ul class="legal-doc__list"><li>Змінювати вартість Послуг, склад та зміст Програми. Такі зміни не поширюються на Замовників, які вже оплатили Послуги.</li><li>Переносити дати проведення окремих сесій/консультацій, повідомивши Замовника завчасно через вказані ним контакти.</li><li>Відмовити Замовнику у наданні Послуг та розірвати цей Договір в односторонньому порядку у разі порушення Замовником умов цього Договору, а також у разі допущення Замовником некоректної, агресивної чи образливої поведінки щодо Виконавця або інших учасників. У цьому випадку сплачені кошти поверненню не підлягають.</li><li>Залучати до надання Послуг третіх осіб (експертів, викладачів, підрядників) без додаткового погодження із Замовником, залишаючись відповідальним за результат.</li></ul><p class="legal-doc__p"><strong>5.3.</strong> Замовник зобов’язується:</p><ul class="legal-doc__list"><li>Зазначати при заповненні форми достовірні дані.</li><li>Своєчасно оплачувати Послуги у розмірі та порядку, встановлених цим Договором.</li><li>Самостійно забезпечити технічні умови, необх ртається у повному обсязі.</li></ul><p class="legal-doc__p"><strong>6.3.</strong> Повернення здійснюється на ту саму банківську картку, з якої було здійснено оплату, у строк до 14 (чотирнадцяти) банківських днів з моменту погодження повернення.</p><p class="legal-doc__p"><strong>6.4.</strong> Заява про повернення направляється Замовником на електронну адресу або в месенджер Виконавця, вказані у розділі «Реквізити», і повинна містити: ПІБ Замовника, дату та суму оплати, контактні дані, причину повернення.</p><h3 class="legal-doc__section">7. Відповідальність Сторін</h3><p class="legal-doc__p"><strong>7.1.</strong> За невиконання або неналежне виконання зобов’язань за цим Договором Сторони несуть відповідальність відповідно до чинного законодавства України.</p><p class="legal-doc__p"><strong>7.2.</strong> Виконавець не несе відповідальності за:</p><ul class="legal-doc__list"><li>неможливість отримання Замовником Послуг з причин, що не залежать від Виконавця (у тому числі через відсутність у Замовника стабільного інтернет-з’єднання, несправність обладнання Замовника, блокування месенджерів провайдерами тощо);</li><li>рішення, дії або бездіяльність Замовника, засновані на отриманій у межах Програми інформації, а також за їх матеріальні, фінансові або інші наслідки;</li><li>якість роботи сторонніх сервісів (платіжних систем, месенджерів, платформ відеозв’язку, хостингу).</li></ul><p class="legal-doc__p"><strong>7.3.</strong> Сукупна відповідальність Виконавця за цим Договором у будь-якому випадку обмежується сумою, фактично сплаченою Замовником за Послуги.</p><p class="legal-doc__p"><strong>7.4.</strong> Сторони звільняються від відповідальності за невиконання зобов’язань при виникненні обставин непереборної сили (форс-мажор), у тому числі — воєнних дій, введення воєнного або надзвичайного стану, актів органів влади, відключень електроенергії та зв’язку, масових кібератак, епідемій та інших подій, що перебувають поза розумним контролем Сторін.</p><h3 class="legal-doc__section">8. Інтелектуальна власність</h3><p class="legal-doc__p"><strong>8.1.</strong> Усі матеріали, що надаються Замовнику в рамках Програми (відео, тексти, методичні матеріали, презентації, записи консультацій тощо), є об’єктами авторського права Виконавця або осіб, які надали Виконавцю відповідні права.</p><p class="legal-doc__p"><strong>8.2.</strong> Замовнику надається обмежене, непередаване, невиключне право використовувати матеріали Програми виключно для особистого некомерційного використання. Копіювання, публічне розповсюдження, перепродаж, публікація в мережі Інтернет або передача матеріалів третім особам без письмової згоди Виконавця заборонені.</p><p class="legal-doc__p"><strong>8.3.</strong> Порушення умов цього розділу є підставою для одностороннього розірвання Договору Виконавцем без повернення сплачених коштів і може спричинити відповідальність відповідно до законодавства України.</p><h3 class="legal-doc__section">9. Конфіденційність та персональні дані</h3><p class="legal-doc__p"><strong>9.1.</strong> Обробка персональних даних Замовника здійснюється відповідно до Політики конфіденційності, розміщеної на Сайті Виконавця, та Закону України «Про захист персональних даних».</p><p class="legal-doc__p"><strong>9.2.</strong> Акцептом цієї оферти Замовник підтверджує, що ознайомлений з Політикою конфіденційності та надає згоду на обробку своїх персональних даних у вказаних у ній цілях та обсязі.</p><h3 class="legal-doc__section">10. Строк дії та розірвання Договору</h3><p class="legal-doc__p"><strong>10.1.</strong> Договір набуває чинності з моменту акцепту та діє до повного виконання Сторонами своїх зобов’язань.</p><p class="legal-doc__p"><strong>10.2.</strong> Договір може бути розірваний достроково за згодою Сторін, а також в односторонньому порядку у випадках, передбачених цим Договором або законодавством України.</p><h3 class="legal-doc__section">11. Вирішення спорів</h3><p class="legal-doc__p"><strong>11.1.</strong> Усі спори та розбіжності, що виникаю l-doc__p"><strong>2.2.</strong> Дані, пов’язані з оплатою:</p><p class="legal-doc__p">При оплаті послуг через платіжну систему WayForPay Оператор отримує підтвердження успішної транзакції, ідентифікатор транзакції, суму, валюту, дату та час платежу. Повні реквізити банківських карток (номер, CVV, строк дії) Оператору НЕ передаються та в Оператора НЕ зберігаються — ці дані обробляються безпосередньо платіжною системою відповідно до стандарту безпеки PCI DSS.</p><p class="legal-doc__p"><strong>2.3.</strong> Дані, що збираються автоматично:</p><ul class="legal-doc__list"><li>IP-адреса;</li><li>тип та версія браузера, операційної системи;</li><li>тип пристрою, роздільна здатність екрана;</li><li>сторінки Сайту, які відвідує Користувач, та час, проведений на них;</li><li>джерело переходу (Referrer);</li><li>файли cookie та ідентифікатори систем вебаналітики.</li></ul><h3 class="legal-doc__section">3. Цілі обробки персональних даних</h3><p class="legal-doc__p">Оператор обробляє персональні дані Користувача з такими цілями:</p><ul class="legal-doc__list"><li>ідентифікація Користувача як сторони договору та надання замовлених послуг;</li><li>зв’язок з Користувачем з питань, пов’язаних з його заявкою, оплатою та проведенням Програми;</li><li>обробка платежів та виконання зобов’язань щодо повернення коштів (за наявності підстав);</li><li>виконання вимог податкового, бухгалтерського та іншого законодавства України;</li><li>покращення роботи Сайту, аналіз поведінки користувачів, забезпечення безпеки;</li><li>направлення інформаційних та сервісних повідомлень (за наявності згоди Користувача — також маркетингових).</li></ul><h3 class="legal-doc__section">4. Правові підстави обробки</h3><p class="legal-doc__p">Оператор обробляє персональні дані на наступних правових підставах:</p><ul class="legal-doc__list"><li>згода Користувача (висловлена, зокрема, шляхом надсилання форми та/або оплати послуг);</li><li>необхідність виконання договору, стороною якого є Користувач;</li><li>необхід строків зберігання або при відкликанні згоди Користувачем дані видаляються або знеособлюються, за винятком випадків, коли їх подальше зберігання обов’язкове в силу закону.</p><h3 class="legal-doc__section">8. Cookies та вебаналітика</h3><p class="legal-doc__p">Сайт використовує файли cookie та інструменти вебаналітики (зокрема Google Analytics, Meta Pixel та аналогічні) для забезпечення коректної роботи Сайту, аналізу трафіку та покращення користувацького досвіду.</p><p class="legal-doc__p">Користувач може у будь-який момент вимкнути cookies у налаштуваннях свого браузера. Це може вплинути на коректність роботи окремих функцій Сайту.</p><h3 class="legal-doc__section">9. Права Користувача</h3><p class="legal-doc__p">Відповідно до Закону України «Про захист персональних даних» Користувач має право:</p><ul class="legal-doc__list"><li>знати про джерела збирання та місце зберігання своїх персональних даних, цілі їх обробки;</li><li>отримувати інформацію про умови надання доступу до персональних даних;</li><li>отримувати доступ до своїх персональних даних;</li><li>вимагати уточнення, блокування або видалення своїх персональних даних, якщо вони обробляються з порушенням закону або є недостовірними;</li><li>відкликати згоду на обробку персональних даних;</li><li>подавати скарги до Уповноваженого Верховної Ради України з прав людини або до суду.</li></ul><p class="legal-doc__p">Для реалізації своїх прав Користувач може звернутися до Оператора за e-mail: 3318494@gmail.com або через Telegram: <a href="https://t.me/m/J6zi2AX5NDYy" target="_blank" rel="noopener noreferrer">https://t.me/m/J6zi2AX5NDYy</a></p><h3 class="legal-doc__section">10. Безпека</h3><p class="legal-doc__p">Оператор вживає необхідних організаційних та технічних заходів для захисту персональних даних від неправомірного або випадкового доступу, знищення, зміни, блокування, копіювання, розповсюдження, а також від інших неправомірних дій третіх осіб: використання захищеного з’єднання (HTTPS), обмеження доступу до
