  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Лендинги</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      font-family: system-ui, sans-serif;
      background: #000;
      color: #e0e0e0;
    }
    h1 { font-size: 1rem; font-weight: 600; margin: 0; color: #888; letter-spacing: 0.02em; }
    nav { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; }
    a {
      color: #fff;
      text-decoration: none;
      padding: 0.5rem 0.9rem;
      border: 1px solid #333;
      border-radius: 6px;
    }
    a:hover { border-color: #666; background: #141414; }
  </style>
</head>
